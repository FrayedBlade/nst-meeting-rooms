services:
  db:
    image: postgres:16-alpine
    container_name: meetingroom-db
    environment:
      POSTGRES_DB: meetingroom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meetingroom-net

  backend:
    build:
      context: ./Backend/MeetingRoom
      dockerfile: Dockerfile
    container_name: meetingroom-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/meetingroom
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DDL_AUTO: update
      CORS_ORIGINS: http://localhost,http://localhost:80
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - meetingroom-net

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost"
    container_name: meetingroom-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meetingroom-net

volumes:
  pgdata:

networks:
  meetingroom-net:
    driver: bridge
